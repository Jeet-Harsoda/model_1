<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
    <script defer src="https://pyscript.net/latest/pyscript.js"></script>
  </head>
  <body>
    <h1>My Python GitHub Page</h1>
    
    <!-- Your Python code goes inside this tag -->
    <py-script>
        print("Hello, world! This is Python running on GitHub Pages.")
        
        # You can even do math or logic
        for i in range(5):
            print(f"Number {i}")
    </py-script>
  </body>
</html>
