<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account | Hoster</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

    <!-- Simple Header for Auth Pages -->
    <nav class="navbar navbar-light bg-white border-bottom py-3">
        <div class="container justify-content-center">
            <a class="navbar-brand fs-2 m-0" href="index.html">
                <i class="fas fa-server" style="color: var(--primary-color);"></i> Hoster<span>.</span>
            </a>
        </div>
    </nav>

    <div class="container section-padding">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card shadow border-0 p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold mb-2">Create your account</h1>
                        <p class="text-muted">Start your website journey today.</p>
                    </div>
                    
                    <form>
                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label for="firstName" class="form-label fw-semibold">First Name</label>
                                <input type="text" class="form-control form-control-lg" id="firstName" placeholder="John" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="lastName" class="form-label fw-semibold">Last Name</label>
                                <input type="text" class="form-control form-control-lg" id="lastName" placeholder="Doe" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email address</label>
                            <input type="email" class="form-control form-control-lg" id="email" placeholder="name@example.com" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <div class="input-group mb-2">
                                <input type="password" class="form-control form-control-lg border-end-0" id="password" placeholder="Create a password" required>
                                <span class="input-group-text bg-white bg-transparent text-muted cursor-pointer">
                                    <i class="far fa-eye"></i>
                                </span>
                            </div>
                            <div class="small text-muted">Must be at least 8 characters.</div>
                        </div>
                        
                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="terms" required>
                            <label class="form-check-label text-muted small" for="terms">
                                I agree to the <a href="#" class="text-decoration-none">Terms of Service</a> and <a href="#" class="text-decoration-none">Privacy Policy</a>.
                            </label>
                        </div>
                        
                        <button type="button" class="btn btn-primary btn-lg w-100 mb-4" onclick="window.location.href='login.html'">Create Account</button>
                        
                        <div class="position-relative mb-4">
                            <hr class="text-muted">
                            <div class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small">Or sign up with</div>
                        </div>
                        
                        <div class="d-flex gap-3 mb-4">
                            <button type="button" class="btn btn-outline-secondary w-50 d-flex align-items-center justify-content-center">
                                <i class="fab fa-google text-danger me-2"></i> Google
                            </button>
                            <button type="button" class="btn btn-outline-secondary w-50 d-flex align-items-center justify-content-center">
                                <i class="fab fa-github me-2"></i> GitHub
                            </button>
                        </div>
                        
                        <p class="text-center text-muted m-0">
                            Already have an account? <a href="login.html" class="fw-semibold text-decoration-none">Log in</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
