<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Hoster</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body class="bg-body">

    <div id="header-placeholder"></div>

    <div class="container section-padding">
        <div class="text-center mb-5">
            <h1 class="h2 fw-bold">Secure Checkout</h1>
            <p class="text-muted"><i class="fas fa-lock text-success me-2"></i>Your connection to this page is encrypted
                and secure.</p>
        </div>

        <div class="row justify-content-center g-4">
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4 p-md-5">
                        <h3 class="h5 fw-bold mb-4">Select Payment Method</h3>

                        <div class="d-flex flex-column gap-3 mb-4">
                            <label
                                class="border rounded p-3 d-flex align-items-center cursor-pointer border-primary bg-primary bg-opacity-10">
                                <input type="radio" name="paymentMethod" class="form-check-input me-3" checked>
                                <div class="d-flex align-items-center justify-content-between w-100">
                                    <span class="fw-bold"><i class="far fa-credit-card me-2"></i> Credit Card</span>
                                    <div>
                                        <i class="fab fa-cc-visa fs-4 text-primary mx-1"></i>
                                        <i class="fab fa-cc-mastercard fs-4 text-warning mx-1"></i>
                                        <i class="fab fa-cc-amex fs-4 text-info mx-1"></i>
                                    </div>
                                </div>
                            </label>

                            <label class="border rounded p-3 d-flex align-items-center cursor-pointer">
                                <input type="radio" name="paymentMethod" class="form-check-input me-3">
                                <div class="d-flex align-items-center justify-content-between w-100">
                                    <span class="fw-bold"><i class="fab fa-paypal me-2" style="color: #003087;"></i>
                                        PayPal</span>
                                </div>
                            </label>

                            <label class="border rounded p-3 d-flex align-items-center cursor-pointer">
                                <input type="radio" name="paymentMethod" class="form-check-input me-3">
                                <div class="d-flex align-items-center justify-content-between w-100">
                                    <span class="fw-bold"><i class="fab fa-google-pay me-2"></i> Google Pay</span>
                                </div>
                            </label>
                        </div>

                        <hr class="my-4">

                        <h4 class="h6 fw-bold mb-3">Card Details</h4>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label small text-muted">Name on Card</label>
                                <input type="text" class="form-control" placeholder="John Doe">
                            </div>
                            <div class="col-12">
                                <label class="form-label small text-muted">Card Number</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-body"><i
                                            class="far fa-credit-card text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0"
                                        placeholder="0000 0000 0000 0000">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Expiry Date</label>
                                <input type="text" class="form-control" placeholder="MM/YY">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">CVC</label>
                                <div class="input-group">
                                    <input type="text" class="form-control border-end-0" placeholder="123">
                                    <span class="input-group-text bg-body"><i class="far fa-question-circle text-muted"
                                            title="3 digits on back of card"></i></span>
                                </div>
                            </div>
                        </div>

                        <button class="btn btn-primary btn-lg w-100 mt-5 shadow"
                            onclick="window.location.href='order-history.html'">Pay $35.88 securely</button>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm sticky-top" style="top: 100px;">
                    <div class="card-body p-4 bg-body rounded">
                        <h3 class="h5 fw-bold mb-4">Order Summary</h3>

                        <div class="d-flex justify-content-between mb-2">
                            <span class="fw-semibold">Premium Web Hosting</span>
                            <span>$143.88</span>
                        </div>
                        <div class="small text-muted mb-3">12 Months Plan</div>

                        <div class="d-flex justify-content-between mb-3 text-success">
                            <span>Discount</span>
                            <span>-$107.91</span>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between mb-1 align-items-center">
                            <span class="fw-bold">Total</span>
                            <span class="fw-bold fs-4 text-primary">$35.88</span>
                        </div>
                        <div class="text-end small text-muted">Includes taxes if applicable</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
