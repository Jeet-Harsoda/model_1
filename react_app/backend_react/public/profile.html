<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Hoster</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body class="bg-body">

    <div id="header-placeholder"></div>

    <div class="container section-padding">
        <div class="row g-4">

            <div class="col-lg-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="p-4 border-bottom text-center">
                            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3"
                                style="width: 80px; height: 80px; font-size: 2rem;">
                                JD
                            </div>
                            <h5 class="fw-bold mb-1">John Doe</h5>
                            <p class="text-muted small mb-0">john.doe@example.com</p>
                        </div>
                        <div class="list-group list-group-flush">
                            <a href="profile.html"
                                class="list-group-item list-group-item-action p-3 active fw-bold border-start border-4 border-primary bg-primary bg-opacity-10 text-primary">
                                <i class="fas fa-user me-2 w-20px"></i> My Profile
                            </a>
                            <a href="order-history.html" class="list-group-item list-group-item-action p-3 text-muted">
                                <i class="fas fa-file-invoice-dollar me-2 w-20px"></i> Order History
                            </a>
                            <a href="#" class="list-group-item list-group-item-action p-3 text-muted">
                                <i class="fas fa-server me-2 w-20px"></i> My Services
                            </a>
                            <a href="#" class="list-group-item list-group-item-action p-3 text-muted">
                                <i class="fas fa-life-ring me-2 w-20px"></i> Support Tickets
                            </a>
                            <a href="login.html"
                                class="list-group-item list-group-item-action p-3 text-danger border-top">
                                <i class="fas fa-sign-out-alt me-2 w-20px"></i> Log Out
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="fw-bold mb-4">Personal Information</h2>

                        <form>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">First Name</label>
                                    <input type="text" class="form-control" value="John">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Last Name</label>
                                    <input type="text" class="form-control" value="Doe">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Email Address</label>
                                    <input type="email" class="form-control" value="john.doe@example.com">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Phone Number</label>
                                    <input type="text" class="form-control" value="+91 9012345678">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Address</label>
                                    <input type="text" class="form-control" value="123 Tech Boulevard">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">City</label>
                                    <input type="text" class="form-control" value="342 Tech City">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">State/Region</label>
                                    <input type="text" class="form-control" value="IN">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label fw-semibold">Zip</label>
                                    <input type="text" class="form-control" value="XXXXXX">
                                </div>
                            </div>
                            <button type="button" class="btn btn-primary px-4 py-2">Save Changes</button>
                        </form>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <h3 class="fw-bold mb-4">Change Password</h3>

                        <form>
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Current Password</label>
                                    <input type="password" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">New Password</label>
                                    <input type="password" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Confirm New Password</label>
                                    <input type="password" class="form-control">
                                </div>
                            </div>
                            <div class="mt-4">
                                <button type="button" class="btn btn-primary px-4 py-2">Update Password</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
